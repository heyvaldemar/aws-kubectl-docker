name: Publish Docker Image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly rebuild to pick up Ubuntu base image security updates.
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: heyvaldemar/aws-kubectl

jobs:
  lint:
    name: Lint Dockerfile and shell scripts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: ShellCheck
        run: |
          shellcheck --version
          shopt -s nullglob globstar
          shellcheck scripts/**/*.sh

  build:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve kubectl version
        id: kube
        run: |
          set -euo pipefail
          version="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved kubectl version: $version"

      - name: Compute build metadata
        id: meta-build
        run: |
          set -euo pipefail
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "vcs_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=kube-${{ steps.kube.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
          labels: |
            org.opencontainers.image.title=aws-kubectl
            org.opencontainers.image.description=Ubuntu 24.04 image bundling AWS CLI v2, kubectl, jq, envsubst, curl and ca-certificates for CI/CD and local tooling.
            org.opencontainers.image.vendor=heyvaldemar
            org.opencontainers.image.licenses=MIT
            io.heyvaldemar.kubectl.version=${{ steps.kube.outputs.version }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        timeout-minutes: 20
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KUBE_VERSION=${{ steps.kube.outputs.version }}
            VCS_REF=${{ steps.meta-build.outputs.vcs_ref }}
            BUILD_DATE=${{ steps.meta-build.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          # Docker Hub OCI referrers credential handoff is unreliable here; the
          # attestation remains available via GitHub Attestations storage.
          push-to-registry: false

      - name: Install cosign
        # Install Cosign v2.6.1 explicitly: cosign-installer v4 defaults to Cosign
        # v3.x, which changes container signature storage to OCI 1.1 referring
        # artifacts. Docker Hub's OCI referrer credential handoff proved unreliable
        # in Phase 2 (see hotfix #20). Cosign v2 keeps tag-based .sig storage which
        # works reliably on Docker Hub today. Full Cosign v3 migration is deferred
        # to a separate tracked project.
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: "v2.6.1"

      - name: Sign image with cosign (keyless)
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          if [ -z "${TAGS}" ] || [ -z "${DIGEST}" ]; then
            echo "ERROR: TAGS or DIGEST is empty" >&2
            exit 1
          fi
          echo "${TAGS}" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "Signing: ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done
          echo "All tags signed successfully"

  scan-trivy:
    name: Scan published image with Trivy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    timeout-minutes: 10
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: trivy.sarif
          category: trivy

  dockerhub-description:
    name: Sync Docker Hub description
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "AWS CLI v2 + kubectl on Ubuntu 24.04. Multi-arch (amd64/arm64), checksum-verified."
          readme-filepath: ./README.md
