name: Publish Docker Image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly rebuild to pick up Ubuntu base image security updates.
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

env:
  IMAGE_NAME: heyvaldemar/aws-kubectl

jobs:
  lint:
    name: Lint Dockerfile and shell scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Hadolint
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: ShellCheck
        run: |
          shellcheck --version
          shopt -s nullglob globstar
          shellcheck scripts/**/*.sh

  build:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve kubectl version
        id: kube
        run: |
          set -euo pipefail
          version="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved kubectl version: $version"

      - name: Compute build metadata
        id: meta-build
        run: |
          set -euo pipefail
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          echo "vcs_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=edge,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=kube-${{ steps.kube.outputs.version }}
          labels: |
            org.opencontainers.image.title=aws-kubectl
            org.opencontainers.image.description=Ubuntu 24.04 image bundling AWS CLI v2, kubectl, jq, envsubst, curl and ca-certificates for CI/CD and local tooling.
            org.opencontainers.image.vendor=heyvaldemar
            org.opencontainers.image.licenses=MIT
            io.heyvaldemar.kubectl.version=${{ steps.kube.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            KUBE_VERSION=${{ steps.kube.outputs.version }}
            VCS_REF=${{ steps.meta-build.outputs.vcs_ref }}
            BUILD_DATE=${{ steps.meta-build.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  dockerhub-description:
    name: Sync Docker Hub description
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@432a30c9e07499fd01da9f8a49f0faf9e0ca5b77 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          short-description: "Ubuntu 24.04 + AWS CLI v2 + kubectl + jq/envsubst/curl. Multi-arch (amd64/arm64), checksum-verified kubectl."
          readme-filepath: ./README.md
